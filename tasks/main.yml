---
- name: Ensure python3-debian is installed
  ansible.builtin.package:
    name: python3-debian
    state: present
  become: true

- name: Download VSCode GPG key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/vscode.asc
    mode: '0644'
  become: true

- name: Add VSCode apt repository
  ansible.builtin.deb822_repository:
    name: vscode
    types: [deb]
    uris: "https://packages.microsoft.com/repos/code"
    architectures: [amd64, arm64, armhf]
    components: [main]
    suites: [stable]
    signed_by: /etc/apt/keyrings/vscode.asc
    state: present
    enabled: true
  become: true

- name: Remove old vscode.list file
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/vscode.list
    state: absent
  become: true

- name: Install VScode
  ansible.builtin.apt:
    name: code
    update_cache: true
    state: present
  ignore_errors: "{{ ansible_check_mode }}"
  become: true
